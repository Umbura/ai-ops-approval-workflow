name: ai-ops-approval

services:
  api:
    build:
      context: .
    env_file:
      - path: .env
        required: false
    environment:
      AI_OPS_DB_PATH: /app/data/app.db
      AI_OPS_API_KEY: ${AI_OPS_API_KEY:-local-development-key}
      AI_OPS_LLM_MODE: ${AI_OPS_LLM_MODE:-mock}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - api_data:/app/data
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.29.10
    entrypoint: ["/bin/sh", "/opt/ai-ops/n8n-entrypoint.sh"]
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_SECURE_COOKIE: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-local-development-encryption-key-change-me}
      WEBHOOK_URL: http://localhost:5678/
      AI_OPS_API_BASE_URL: http://api:8000
      AI_OPS_API_KEY: ${AI_OPS_API_KEY:-local-development-key}
      AI_OPS_WEBHOOK_SECRET: ${AI_OPS_WEBHOOK_SECRET:-local-webhook-secret}
      GENERIC_TIMEZONE: America/Sao_Paulo
      TZ: America/Sao_Paulo
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows/ai_ops_approval_n8n.json:/opt/ai-ops/workflow.json:ro
      - ./docker/n8n-entrypoint.sh:/opt/ai-ops/n8n-entrypoint.sh:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:5678/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 5
    restart: unless-stopped

volumes:
  api_data:
  n8n_data:
