name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev --locked

      - name: Lint
        run: uv run ruff check .

      - name: Format
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy

      - name: Test with coverage
        run: uv run pytest --cov --cov-report=term-missing

      - name: Compile
        run: uv run python -m compileall -q src tests

      - name: Validate frontend and workflow
        run: |
          node --check src/ai_ops_approval/static/app.js
          python -m json.tool workflows/ai_ops_approval_n8n.json > /dev/null

      - name: Validate Compose
        run: docker compose config --quiet

      - name: Build API container
        run: docker build --tag ai-ops-approval:test .
